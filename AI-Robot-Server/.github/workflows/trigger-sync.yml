name: Trigger Public Sync

on:
  push:
    branches: [main, master]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Get commit message
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Trigger sync in public repo
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PUBLIC_REPO_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/nikita-razgulyaev/AI-Robotic-Owl/dispatches \
            -d '{
              "event_type":"sync-trigger",
              "client_payload":{
                "source":"AI-Robot-Server",
                "commit_message":"${{ steps.commit.outputs.message }}"
              }
            }'
