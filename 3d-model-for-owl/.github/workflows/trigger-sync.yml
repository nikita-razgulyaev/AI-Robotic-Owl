name: Trigger Public Sync

on:
    push:
        branches: [main, master]

jobs:
    trigger:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Get commit message
              id: commit
              run: |
                  MSG=$(git log -1 --pretty=%B)
                  echo "message=$MSG" >> $GITHUB_OUTPUT
                  echo "Commit message: $MSG"

            - name: Trigger sync in public repo
              run: |
                  curl -X POST \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer ${{ secrets.PUBLIC_REPO_PAT }}" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    https://api.github.com/repos/nikita-razgulyaev/AI-Robotic-Owl/dispatches \
                    -d "{
                      \"event_type\":\"sync-trigger\",
                      \"client_payload\":{
                        \"source\":\"${{ github.event.repository.name }}\",
                        \"commit_message\":\"${{ steps.commit.outputs.message }}\"
                      }
                    }"
